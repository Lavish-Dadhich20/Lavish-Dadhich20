<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050714;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#0d0826;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0520;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#818cf8" />
      <stop offset="50%" style="stop-color:#a855f7" />
      <stop offset="100%" style="stop-color:#ec4899" />
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:0" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="orb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="orb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#bgGrad)" rx="12"/>

  <!-- Grid lines -->
  <g opacity="0.07" stroke="#818cf8" stroke-width="0.5">
    <line x1="0" y1="40" x2="900" y2="40"/>
    <line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="150" y1="0" x2="150" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/>
    <line x1="450" y1="0" x2="450" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="750" y1="0" x2="750" y2="200"/>
  </g>

  <!-- Ambient orbs -->
  <ellipse cx="150" cy="100" rx="180" ry="100" fill="url(#orb1)">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="4s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="750" cy="100" rx="180" ry="100" fill="url(#orb2)">
    <animate attributeName="opacity" values="1;0.5;1" dur="3.5s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Floating particles -->
  <circle cx="80" cy="50" r="2" fill="#818cf8" opacity="0.7" filter="url(#glow)">
    <animate attributeName="cy" values="50;30;50" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0.2;0.7" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="820" cy="150" r="1.5" fill="#ec4899" opacity="0.6" filter="url(#glow)">
    <animate attributeName="cy" values="150;130;150" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="450" cy="20" r="1.5" fill="#a855f7" opacity="0.5" filter="url(#glow)">
    <animate attributeName="cy" values="20;10;20" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="170" r="2" fill="#6366f1" opacity="0.4" filter="url(#glow)">
    <animate attributeName="cx" values="200;220;200" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="680" cy="30" r="1.5" fill="#a855f7" opacity="0.5" filter="url(#glow)">
    <animate attributeName="cx" values="680;660;680" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.2;0.5" dur="3.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Corner accent brackets -->
  <g stroke="#4f46e5" stroke-width="1.5" fill="none" opacity="0.8">
    <path d="M 20 20 L 20 8 L 32 8"/>
    <path d="M 880 20 L 880 8 L 868 8"/>
    <path d="M 20 180 L 20 192 L 32 192"/>
    <path d="M 880 180 L 880 192 L 868 192"/>
  </g>

  <!-- Top accent line -->
  <rect x="0" y="0" width="900" height="2" fill="url(#lineGrad)" rx="1"/>
  <!-- Bottom accent line -->
  <rect x="0" y="198" width="900" height="2" fill="url(#lineGrad)" rx="1"/>

  <!-- Terminal cursor blink left -->
  <text x="30" y="105" font-family="monospace" font-size="11" fill="#4f46e5" opacity="0.5">&gt;_</text>

  <!-- Main Name -->
  <text x="450" y="90" text-anchor="middle" font-family="'Courier New', monospace" font-size="48" font-weight="900" fill="url(#nameGrad)" filter="url(#strongGlow)" letter-spacing="4">
    LAVISH DADHICH
    <animate attributeName="opacity" values="0;1" dur="1s" fill="freeze"/>
  </text>

  <!-- Divider line under name -->
  <line x1="250" y1="100" x2="650" y2="100" stroke="url(#lineGrad)" stroke-width="1" opacity="0.6"/>

  <!-- Role text -->
  <text x="450" y="130" text-anchor="middle" font-family="'Courier New', monospace" font-size="13.5" fill="#94a3b8" letter-spacing="2.5">
    FULL-STACK DEV  ✦  AGENTIC AI BUILDER  ✦  B.TECH CSE
    <animate attributeName="opacity" values="0;1" dur="1.5s" fill="freeze"/>
  </text>

  <!-- Bottom status bar -->
  <rect x="20" y="166" width="860" height="1" fill="url(#lineGrad)" opacity="0.4"/>
  <text x="30" y="182" font-family="monospace" font-size="9" fill="#4f46e5" opacity="0.7">[ SYSTEM: ONLINE ]</text>
  <text x="450" y="182" text-anchor="middle" font-family="monospace" font-size="9" fill="#a855f7" opacity="0.6">◈ CGPA 8.7/10 ◈ UDAIPUR, INDIA ◈</text>
  <text x="870" y="182" text-anchor="end" font-family="monospace" font-size="9" fill="#ec4899" opacity="0.7">[ READY TO BUILD ]</text>

  <!-- Scanning line animation -->
  <rect x="0" y="0" width="900" height="2" fill="url(#lineGrad)" opacity="0.3" rx="1">
    <animate attributeName="y" values="-2;202" dur="4s" repeatCount="indefinite" calcMode="linear"/>
    <animate attributeName="opacity" values="0;0.4;0.4;0" dur="4s" repeatCount="indefinite"/>
  </rect>
</svg>
